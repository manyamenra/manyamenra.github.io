<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8" />

<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<title>ASCVD Risk Classifier</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>

body {

font-family: 'Inter', sans-serif;

background-color: #eef2f7;

padding: 30px;

margin: 0;

}

.container {

max-width: 900px;

margin: 0 auto;

background: #ffffff;

padding: 30px;

border-radius: 20px;

box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);

}

h1 {

text-align: center;

color: #1a202c;

font-size: 2rem;

margin-bottom: 30px;

}

form {

display: grid;

grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));

gap: 20px;

}

label {

font-weight: 600;

display: flex;

flex-direction: column;

font-size: 0.95rem;

color: #2d3748;

}

input[type="number"],

select {

margin-top: 8px;

padding: 10px;

border: 1px solid #cbd5e0;

border-radius: 8px;

font-size: 1rem;

background-color: #f9fafb;

}

.checkboxes {

grid-column: span 2;

margin-top: 10px;

background-color: #f1f5f9;

padding: 20px;

border-radius: 10px;

display: flex;

align-items: right;

flex-wrap: wrap;

gap: 10px 40px;

}



.checkboxes label {

  display: flex;

  justify-content: space-between;

  align-items: center;

  font-weight: 500;

  font-size: 0.95rem;

  padding: 6px 0;

  width: 100%;

}



.checkboxes input[type="checkbox"] {

  margin-left: 20px;

  transform: scale(1.2); /* Optional: makes checkbox slightly larger */

}



button[type="submit"] {

grid-column: span 2;

padding: 12px;

background-color: #3b82f6;

color: white;

border: none;

border-radius: 10px;

font-size: 1rem;

font-weight: 600;

cursor: pointer;

transition: background-color 0.3s;

}

button[type="submit"]:hover {

background-color: #2563eb;

}

.result {

margin-top: 30px;

padding: 20px;

border-radius: 12px;

background-color: #e0f2fe;

border-left: 6px solid #0284c7;

font-size: 1rem;

}

.error {

color: red;

font-size: 0.9em;

}

</style>

</head>

<body>

<div class="container">

<h1>ASCVD Risk Classifier</h1>

<form id="riskForm">







<label>Age <input type="number" id="age" min="0" max="120" /></label>

<label>Sex

<select id="sex">

<option value="male">Male</option>

<option value="female">Female</option>

</select>

</label>



<label>Low density lipoprotein cholesterol (LDL-C) (mg/dL): <input type="number" id="ldl" min="0" max="400" /></label>

<label>High density lipoprotein cholesterol (HDL-C) (mg/dL): <input type="number" id="hdl" min="0" max="150" /></label>

<label>Non-HDL-C (mg/dL): <input type="number" id="nonhdl" min="0" max="400" /></label>

<label>Apolipoprotein B (mg/dL): <input type="number" id="apob" min="0" max="200" /></label>

<label>Fasting Triglycerides (Tg) (mg/dL): <input type="number" id="ftg" min="0" max="2000" /></label>

<label>Non-fasting Triglycerides (Tg) (mg/dL): <input type="number" id="nftg" min="0" max="2000" /></label>

<label>Fasting Blood Glucose (mg/dL): <input type="number" id="glucose" min="0" max="500" /></label>

<label>Lipoprotein(a) (mg/dL): <input type="number" id="lpa" min="0" max="200" /></label>



<label>Coronary artery calcium score (CACS): <input type="number" id="cacs" min="0" max="1000" /></label>

<label>CACS Percentile: <input type="number" id="cacsPercentile" min="0" max="100" /></label>

<label>Lifetime cardiovascular disease (CVD) Risk (%) (Estimated using the QRISK3-lifetime cardiovascular risk calculator): <input type="number" id="cvdrisk" min="0" max="100" /></label>



<div class="checkboxes">



<label>Current cigarette smoking or tobacco use (Tobacco use includes cultural tobacco, such as bidis, paan, gutka, etc.)<input type="checkbox" id="smoker" /></label>



<label>Waist circumference elevated (>90 cm in males, & >80 cm in females, to be measured at the superior border of the iliac crest just after expiration. <input type="checkbox" id="waistCheckbox" /></label>



<label>Hypertension (≥140/90 mm Hg or on anti-hypertensive treatment.)<input type="checkbox" id="htnCheckbox" /></label>



<label>Diabetes mellitus<input type="checkbox" id="diabetes" /></label>



<label>Diabetes with target organ damage<input type="checkbox" id="diabDamage" /></label>



<label>Established atherosclerotic cardiovascular disease (ASCVD) (Includes stenotic or non-stenotic carotid, femoral or coronary arterial plaques, as well as an ankle-brachial index <0.9 in either leg )<input type="checkbox" id="ascvd" /></label>



<label>Recurrent ASCVD despite LDL ~30 <input type="checkbox" id="recASCVD" /></label>



<label>Recurrent acute coronary syndrome (ACS)<input type="checkbox" id="recurrentACS" /></label>



<label>Heterozygous familial hypercholesterolemia (FH)<input type="checkbox" id="hetFH" /></label>



<label>Homozygous familial hypercholesterolemia (FH)<input type="checkbox" id="homoFH" /></label>



<label>Polyvascular Disease<input type="checkbox" id="polyvascular" /></label>



<label>Chronic kidney disease (CKD ≥ Stage 3b or 4) (CKD-chronic kidney disease)<input type="checkbox" id="ckd" /></label>



<label>Family history of premature ASCVD<input type="checkbox" id="familyHistory" /></label>



<label>Metabolic syndrome<input type="checkbox" id="metabolic" /></label>



<label>Non alcoholic fatty liver disease (NAFLD) with grade 2 or 3 fibrosis<input type="checkbox" id="nafld" /></label>



<label>Premature menopause, pre eclampsia, gestational diabetes Polycystic ovarian syndrome (PCOS)<input type="checkbox" id="preg" /></label>



<label>Rheumatoid arthritis, psoriasis and spondyloarthropathies<input type="checkbox" id="ra" /></label>



<label>Exposure to air pollution<input type="checkbox" id="pollution" /></label>



<label>High polygenic risk score<input type="checkbox" id="polygenic" /></label>



<label>Human immunodeficiency virus infection<input type="checkbox" id="hiv" /></label>



<label>hsCRP > 2 mg/L (On two occasions at least 2 weeks apart )<input type="checkbox" id="hscrpCheckbox" /></label>



<label>Extreme elevation of single risk factor (defined as regular smoking >1 pack of cigarettes per day or blood pressure >180/110 mmHg)<input type="checkbox" id="extreme" /></label>



</div>

<button type="submit">Classify Risk</button>

</form>

<div id="result" class="result"></div>

</div>



<script>

document.getElementById('riskForm').addEventListener('submit', function (e) {

  e.preventDefault();



  const age = parseInt(document.getElementById('age').value);

  const sex = document.getElementById('sex').value;



if (isNaN(age) || !sex) {

  document.getElementById('result').innerHTML = "<span class='error'>Please enter a valid age and select sex.</span>";

  return;

}



// === Safe helper function for numbers ===

const getNumberOrNull = (id) => {

  const val = document.getElementById(id)?.value;

  return val !== '' ? parseFloat(val) : null;

};



// === Checkboxes ===

const waistCheckbox = document.getElementById('waistCheckbox')?.checked || false;

const htnCheckbox = document.getElementById('htnCheckbox')?.checked || false;

const smoker = document.getElementById('smoker')?.checked || false;

const diabetes = document.getElementById('diabetes')?.checked || false;

const diabDamage = document.getElementById('diabDamage')?.checked || false;

const ascvd = document.getElementById('ascvd')?.checked || false;

const recASCVD = document.getElementById('recASCVD')?.checked || false;

const recurrentACS = document.getElementById('recurrentACS')?.checked || false;

const hetFH = document.getElementById('hetFH')?.checked || false;

const homoFH = document.getElementById('homoFH')?.checked || false;

const polyvascular = document.getElementById('polyvascular')?.checked || false;

const hscrpCheckbox = document.getElementById('hscrpCheckbox')?.checked || false;

const ckd = document.getElementById('ckd')?.checked || false;

const familyHistory = document.getElementById('familyHistory')?.checked || false;

const metabolic = document.getElementById('metabolic')?.checked || false;

const nafld = document.getElementById('nafld')?.checked || false;

const preg = document.getElementById('preg')?.checked || false;

const ra = document.getElementById('ra')?.checked || false;

const pollution = document.getElementById('pollution')?.checked || false;

const polygenic = document.getElementById('polygenic')?.checked || false;

const hiv = document.getElementById('hiv')?.checked || false;

const extreme = document.getElementById('extreme')?.checked || false;



// === Numeric values (null-safe) ===

const ldl = getNumberOrNull('ldl');

const nonhdl = getNumberOrNull('nonhdl');

const hdl = getNumberOrNull('hdl');

const apob = getNumberOrNull('apob');

const lpa = getNumberOrNull('lpa');

const glucose = getNumberOrNull('glucose');

const ftg = getNumberOrNull('ftg');

const nftg = getNumberOrNull('nftg');

const cacs = getNumberOrNull('cacs');

const cacsPercentile = getNumberOrNull('cacsPercentile');

const cvdrisk = getNumberOrNull('cvdrisk');





  // --- Risk Calculation Logic ---

  let majorFactors = 0;

  if ((sex === 'male' && age >= 45) || (sex === 'female' && age >= 55)) majorFactors++;

  if (smoker) majorFactors++;

 if (hdl !== null && ((sex === 'male' && hdl < 40) || (sex === 'female' && hdl < 50))) majorFactors++;

if (htnCheckbox) majorFactors++;



  let highRiskFeatures = 0;

  if (familyHistory) highRiskFeatures++;

  if (ckd) highRiskFeatures++;

  if (apob > 130) highRiskFeatures++;

  if (lpa >= 50) highRiskFeatures++;

  if (ldl >= 190 || nonhdl >= 220) highRiskFeatures++;

  if (extreme) highRiskFeatures++;

  if (metabolic) highRiskFeatures++;

  if (nafld) highRiskFeatures++;

  if ((cacs >= 1 && cacs <= 99) && cacsPercentile < 75) highRiskFeatures++;



  let modifiers = 0;

  if (lpa >= 20 && lpa < 50) modifiers++;

  if (glucose >= 100 && glucose <= 125) modifiers++;

  if (waistCheckbox) modifiers++;

  if (hscrpCheckbox) modifiers++;

  if ((ftg > 150) || (nftg > 175)) modifiers++;

  if (hiv) modifiers++;

  if (polygenic) modifiers++;

  if (preg) modifiers++;

  if (ra) modifiers++;

  if (pollution) modifiers++;



  let riskCategory = "Unclassified";



  let veryHighGroupFeatures = 0;

  if (diabDamage) veryHighGroupFeatures++;

  if (diabetes && majorFactors >= 2) veryHighGroupFeatures++;

  if ((cacs >= 100 && cacs <= 299) || ((cacs >= 1 && cacs <= 99) && cacsPercentile > 75)) veryHighGroupFeatures++;

  if (highRiskFeatures >= 2) veryHighGroupFeatures++;

  if (hetFH || ldl >= 190) veryHighGroupFeatures++;

  if (ascvd) veryHighGroupFeatures++;





  if (recASCVD) {

    riskCategory = "Extreme Risk – Category C";

  } else if (

    ascvd && (

      diabDamage ||

      (diabetes && majorFactors >= 2) ||

      (cacs >= 100 && cacs <= 299) ||

      ((cacs >= 1 && cacs <= 99) && cacsPercentile > 75) ||

      highRiskFeatures >= 2 ||

      hetFH || ldl >= 190 ||

      recurrentACS || polyvascular || homoFH

    )

  ) {

    riskCategory = "Extreme Risk – Category B";

  } else if (

    (ascvd && (

      majorFactors >= 3 ||

      (ldl >= 160 && ldl <= 189) ||

      (nonhdl >= 190 && nonhdl <= 219) ||

      (diabetes && majorFactors <= 1) ||

      (majorFactors === 2 && modifiers >= 1) ||

      highRiskFeatures === 1

    )) ||

    cacs >= 300 ||

    homoFH

  ) {

    riskCategory = "Extreme Risk – Category A";

    } else if (

    diabDamage ||

    (diabetes && majorFactors >= 2) ||

    (cacs >= 100 && cacs <= 299) ||

    ((cacs >= 1 && cacs <= 99) && cacsPercentile > 75) ||

    highRiskFeatures >= 2 ||

    ascvd ||

    hetFH || (ldl >= 190)

  ) {

    riskCategory = "Very High Risk";

  } else if (

    majorFactors >= 3 ||

    (ldl >= 160 && ldl <= 189) ||

    (nonhdl >= 190 && nonhdl <= 219) ||

    (diabetes && majorFactors <= 1) ||

    (majorFactors === 2 && modifiers >= 1) ||

    highRiskFeatures === 1

  ) {

    riskCategory = "High Risk";



} else if (

  (majorFactors === 2) ||

  (ldl >= 130 && ldl <= 159) ||

  (nonhdl >= 160 && nonhdl <= 189) ||

  (

    (modifiers >= 1 || (cvdrisk >= 30)) &&

    (

      majorFactors <= 1 &&

      (ldl >= 100 && ldl <= 129) &&

      (nonhdl >= 130 && nonhdl <= 159)

    )

  )

) {

  riskCategory = "Moderate Risk";

} else if (

  (majorFactors <= 1) &&

  (

    (ldl >= 100 && ldl <= 129) &&

    (nonhdl >= 130 && nonhdl <= 159)

  ) &&

  (cvdrisk === null || cvdrisk <= 30)

) {

  riskCategory = "Low Risk";

}



// ✅ Fallback for when only lifetime CVD risk is present

if (riskCategory === "Unclassified") {

  if (cvdrisk !== null && cvdrisk > 30) {

    riskCategory = "Moderate Risk";

  } else if (cvdrisk !== null && cvdrisk <= 30) {

    riskCategory = "Low Risk";

  }

}







  const targets = {

    "Low Risk": { ldl: "<100", nonhdl: "<130", apob: "<90" },

    "Moderate Risk": { ldl: "<100 (optional <70)", nonhdl: "<130 (optional <100)", apob: "<90" },

    "High Risk": { ldl: "<70", nonhdl: "<100", apob: "<80" },

    "Very High Risk": { ldl: "<50", nonhdl: "<80", apob: "<65" },

    "Extreme Risk – Category A": { ldl: "<50 (optional ≤30)", nonhdl: "<80 (optional ≤60)", apob: "<65" },

    "Extreme Risk – Category B": { ldl: "≤30", nonhdl: "≤60", apob: "<50" },

    "Extreme Risk – Category C": { ldl: "10–15", nonhdl: "40–45", apob: "–" }

  };



  const lipidTargets = targets[riskCategory];



  const resultBox = document.getElementById('result');

  resultBox.innerHTML = `<strong>Risk Category:</strong> ${riskCategory}<br><br>

  <strong>Ideal Lipid Targets:</strong><br>

  LDL-C: ${lipidTargets?.ldl || '—'}<br>

  Non-HDL-C: ${lipidTargets?.nonhdl || '—'}<br>

  ApoB: ${lipidTargets?.apob || '—'}`;

});

</script>



</body>

</html>
